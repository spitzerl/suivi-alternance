services:
  # BDD
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Client Web BDD (Interface visuelle)
  adminer:
    image: adminer:latest
    container_name: db_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  # Backend
  backend:
    build: ./backend
    container_name: node_backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${PORT}:${PORT}"
      - "5555:5555"
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY}
    depends_on:
      - db

  # Frontend
  frontend:
    build: ./frontend
    container_name: react_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

volumes:
  postgres_data:
