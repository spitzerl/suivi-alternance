services:
  # BDD
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: alternance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Client Web BDD (Interface visuelle)
  adminer:
    image: adminer:latest
    container_name: db_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  # Backend
  backend:
    build: ./backend
    container_name: node_backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/alternance_db
    depends_on:
      - db

  # Frontend
  frontend:
    build: ./frontend
    container_name: react_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
