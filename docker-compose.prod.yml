services:
  # BDD
  db:
    image: postgres:15-alpine
    container_name: prod_postgres_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    networks:
      - prod_network

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: prod_node_backend
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY}
    depends_on:
      - db
    networks:
      - prod_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: prod_react_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - prod_network

networks:
  prod_network:
    driver: bridge

volumes:
  prod_postgres_data:
